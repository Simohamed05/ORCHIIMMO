<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Orchiimmo — Maroc{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- CSS Orchiimmo -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/orchiimmo.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  {% include 'navbar.html' %}

  <!-- Messages Django -->
  {% if messages %}
    <div class="container mt-3">
      {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %} alert-dismissible fade show" role="alert">
          <i class="bi bi-{% if msg.tags == 'success' %}check-circle{% elif msg.tags == 'error' %}x-circle{% else %}info-circle{% endif %} me-2"></i>
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fermer"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer mt-auto py-3 text-center">
    <small class="text-muted">
      <i class="bi bi-building me-1"></i>
      <strong>ORCHIIMMO</strong> &copy; 2026 &mdash; Plateforme Immobilière Maroc
      &nbsp;|&nbsp;
      <i class="bi bi-mortarboard me-1"></i> PFE 2025-2026
    </small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/orchiimmo.js' %}"></script>
  {% block extra_js %}{% endblock %}

  <!-- Bouton scroll-to-top -->
  <button id="scroll-top" aria-label="Retour en haut"
          style="position:fixed;bottom:24px;right:24px;z-index:999;
                 width:44px;height:44px;border-radius:50%;border:none;
                 background:linear-gradient(135deg,#4895EF,#7C3AED);
                 color:#fff;font-size:1.1rem;cursor:pointer;
                 opacity:0;pointer-events:none;
                 box-shadow:0 4px 15px rgba(72,149,239,0.4);
                 transition:opacity 0.3s,transform 0.3s;">
    <i class="bi bi-chevron-up"></i>
  </button>
</body>
</html>
