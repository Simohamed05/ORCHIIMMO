<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Orchiimmo — Maroc{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- CSS Orchiimmo -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/orchiimmo.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  {% include 'navbar.html' %}

  <!-- Messages Django -->
  {% if messages %}
    <div class="container mt-3">
      {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %} alert-dismissible fade show" role="alert">
          <i class="bi bi-{% if msg.tags == 'success' %}check-circle{% elif msg.tags == 'error' %}x-circle{% else %}info-circle{% endif %} me-2"></i>
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fermer"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer mt-auto py-3 text-center">
    <small class="text-muted">
      <i class="bi bi-building me-1"></i>
      <strong>ORCHIIMMO</strong> &copy; 2026 &mdash; Plateforme Immobilière Maroc
      &nbsp;|&nbsp;
      <i class="bi bi-mortarboard me-1"></i> PFE 2025-2026
    </small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/orchiimmo.js' %}"></script>
  {% block extra_js %}{% endblock %}

  <!-- Bouton scroll-to-top -->
  <button id="scroll-top" aria-label="Retour en haut"
          style="position:fixed;bottom:24px;right:24px;z-index:999;
                 width:44px;height:44px;border-radius:50%;border:none;
                 background:linear-gradient(135deg,#4895EF,#7C3AED);
                 color:#fff;font-size:1.1rem;cursor:pointer;
                 opacity:0;pointer-events:none;
                 box-shadow:0 4px 15px rgba(72,149,239,0.4);
                 transition:opacity 0.3s,transform 0.3s;">
    <i class="bi bi-chevron-up"></i>
  </button>

  <!-- ═══ N8N CHATBOT WIDGET ════════════════════════════════════════════ -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    :root {
      --chat--color-primary:           #4895EF;
      --chat--color-primary-shade-50:  #3a7acc;
      --chat--color-primary-shade-100: #2d5f99;
      --chat--color-secondary:         #7C3AED;
      --chat--color-secondary-shade-50:#6930c3;
      --chat--color-white:             #E2E8F0;
      --chat--color-light:             #1A1F35;
      --chat--color-light-shade-50:    #121728;
      --chat--color-light-shade-100:   #0D1120;
      --chat--color-medium:            #8892A4;
      --chat--color-dark:              #E2E8F0;
      --chat--color-disabled:          #4A5568;
      --chat--color-typing:            #4895EF;
      --chat--header--background:      linear-gradient(135deg,#4895EF,#7C3AED);
      --chat--header--color:           #ffffff;
      --chat--message--bot--background:  #1A1F35;
      --chat--message--bot--color:       #E2E8F0;
      --chat--message--user--background: linear-gradient(135deg,#4895EF,#7C3AED);
      --chat--message--user--color:      #ffffff;
      --chat--input--background:       #121728;
      --chat--input--border-color:     rgba(72,149,239,0.3);
      --chat--input--text-color:       #E2E8F0;
      --chat--input--placeholder--color:#8892A4;
      --chat--input--send--button--background: linear-gradient(135deg,#4895EF,#7C3AED);
      --chat--input--send--button--color: #fff;
      --chat--window--background:      #0D1120;
      --chat--window--border-color:    rgba(72,149,239,0.15);
      --chat--toggle--background:      linear-gradient(135deg,#4895EF,#7C3AED);
      --chat--toggle--hover--background:linear-gradient(135deg,#3a7acc,#6930c3);
      --chat--toggle--color:           #ffffff;
      --chat--toggle--size:            56px;
      --chat--border-radius:           14px;
    }
    body.light-mode {
      --chat--color-light:             #F1F5FB;
      --chat--color-light-shade-50:    #E2E8F0;
      --chat--color-light-shade-100:   #CBD5E0;
      --chat--color-dark:              #0F172A;
      --chat--message--bot--background:#FFFFFF;
      --chat--message--bot--color:     #0F172A;
      --chat--input--background:       #FFFFFF;
      --chat--input--text-color:       #0F172A;
      --chat--window--background:      #F1F5FB;
    }
    /* Positionner au-dessus du bouton scroll-to-top (z-index 999) */
    .n8n-chat .chat-toggle {
      bottom: 88px !important;
      right:  24px  !important;
      z-index: 1000 !important;
      box-shadow: 0 4px 20px rgba(72,149,239,0.4) !important;
    }
    .n8n-chat .chat-window {
      z-index: 1001 !important;
      border: 1px solid rgba(72,149,239,0.15) !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6) !important;
    }
  </style>
  <script type="module">
  import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

  // ── Nouvelle session à chaque chargement de page ──────────────────────────
  // Le widget stocke le sessionId dans localStorage → n8n retrouve l'historique
  // de la session précédente. On efface les clés chat/n8n pour repartir de zéro.
  try {
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.includes('n8n') || k.includes('chat'))) toRemove.push(k);
    }
    toRemove.forEach(k => localStorage.removeItem(k));
  } catch(e) {}

  createChat({
    webhookUrl: window.location.origin + '/chatbot/',
    mode: 'window',
    showWelcomeScreen: false,
    initialMessages: [
      '🏠 Bonjour ! Je suis l\'assistant IA d\'Orchiimmo.',
      'Je peux vous aider à estimer un prix, explorer le catalogue ou répondre à vos questions sur l\'immobilier marocain.'
    ],
    i18n: {
      en: {
        title: 'Assistant Orchiimmo',
        subtitle: 'IA Immobilier Maroc 🇲🇦',
        footer: '',
        getStarted: 'Nouvelle conversation',
        inputPlaceholder: 'Posez votre question…',
        closeButtonTooltip: 'Fermer',
      },
    },
  });
  </script>
  <!-- ═══════════════════════════════════════════════════════════════════ -->
</body>
</html>
