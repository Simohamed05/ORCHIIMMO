  /* ── Nodes ── */
  .node-center rect  { fill: url(#gradCenter); rx: 20; filter: drop-shadow(0 0 24px rgba(72,149,239,0.6)); }
  .node-main   rect  { rx: 14; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
  .node-sub    rect  { rx: 10; filter: drop-shadow(0 0 6px rgba(0,0,0,0.4)); }
  .node-leaf   rect  { rx: 8;  filter: drop-shadow(0 0 4px rgba(0,0,0,0.3)); }

  .node-center text { fill: #fff; font-size: 18px; font-weight: 800; }
  .node-main   text { fill: #fff; font-size: 13px; font-weight: 700; }
  .node-sub    text { fill: #E2E8F0; font-size: 11px; font-weight: 600; }
  .node-leaf   text { fill: #CBD5E0; font-size: 10px; font-weight: 400; }

  .icon-text { font-size: 16px; dominant-baseline: middle; }

  /* ── Edges ── */
  .edge { fill: none; stroke-width: 2; opacity: 0.6; }
  .edge-main { stroke-width: 2.5; opacity: 0.7; }
  .edge-sub  { stroke-width: 1.5; opacity: 0.5; }
  .edge-leaf { stroke-width: 1;   opacity: 0.4; }

  /* ── Controls ── */

// ══════════════════════════════════════════════════════════════
// LAYOUT ENGINE
// ══════════════════════════════════════════════════════════════
function toRad(deg) { return deg * Math.PI / 180; }

function computePositions(node, cx, cy, parentAngle, spread) {
  node.x = cx; node.y = cy;
  if (!node.children || node.children.length === 0) return;

  const n = node.children.length;
  const isMain = node.type === 'center';
  const dist = isMain ? (node.children[0].dist || 220) : (node.type === 'main' ? 140 : 120);

  node.children.forEach((child, i) => {
    let angle;
    if (isMain) {
      angle = child.angle !== undefined ? child.angle : (i / n) * 360 - 90;
    } else {
      const base = parentAngle;
      const range = n === 1 ? 0 : (n <= 3 ? 60 : n <= 5 ? 80 : 100);
      angle = base + (i - (n - 1) / 2) * (range / Math.max(n - 1, 1));
    }
    const d = child.dist || dist;
    child.x = cx + Math.cos(toRad(angle)) * d;
    child.y = cy + Math.sin(toRad(angle)) * d;
    child._angle = angle;
    computePositions(child, child.x, child.y, angle, spread * 0.8);
  });
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
const svg = document.getElementById('svg');
const root = document.getElementById('root');
let transform = { x: 0, y: 0, scale: 1 };

function applyTransform() {
  root.setAttribute('transform',
    `translate(${transform.x}, ${transform.y}) scale(${transform.scale})`);
}

function bezier(x1,y1,x2,y2) {
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const dx = x2-x1, dy = y2-y1;
  const cx1 = x1 + dx*0.5, cy1 = y1;
  const cx2 = x2 - dx*0.5, cy2 = y2;
  return `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
}

function edgeClass(type) {
  if (type === 'center') return 'edge edge-main';
  if (type === 'main')   return 'edge edge-sub';
  return 'edge edge-leaf';
}

function renderEdges(node) {
  if (!node.children) return;
  node.children.forEach(child => {
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', bezier(node.x, node.y, child.x, child.y));
    const color = child.color === 'gradCenter' ? '#4895EF' : `url(#${child.color})`;
    path.setAttribute('stroke', getComputedColor(child.color));
    path.setAttribute('class', edgeClass(node.type));
    root.insertBefore(path, root.firstChild);
    renderEdges(child);
  });
}

function getComputedColor(gradId) {
  const map = {
    'gradCenter':'#4895EF','g0':'#4895EF','g1':'#7C3AED','g2':'#06D6A0',
    'g3':'#F59E0B','g4':'#EF4444','g5':'#EC4899','g6':'#14B8A6','g7':'#8B5CF6'
  };
  return map[gradId] || '#4895EF';
}

const GLOW_COLORS = {
  'gradCenter':'rgba(72,149,239,0.5)','g0':'rgba(72,149,239,0.35)',
  'g1':'rgba(124,58,237,0.35)','g2':'rgba(6,214,160,0.35)',
  'g3':'rgba(245,158,11,0.35)','g4':'rgba(239,68,68,0.35)',
  'g5':'rgba(236,72,153,0.35)','g6':'rgba(20,184,166,0.35)','g7':'rgba(139,92,246,0.35)'
};

function renderNode(node) {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class', `node-${node.type}`);
  g.setAttribute('transform', `translate(${node.x - node.w/2}, ${node.y - node.h/2})`);
  g.style.cursor = 'pointer';

  // Shadow glow rect
  const glow = document.createElementNS('http://www.w3.org/2000/svg','rect');
  glow.setAttribute('x', -4); glow.setAttribute('y', -4);
  glow.setAttribute('width', node.w + 8); glow.setAttribute('height', node.h + 8);
  glow.setAttribute('rx', node.type === 'center' ? 24 : node.type === 'main' ? 18 : 12);
  glow.setAttribute('fill', GLOW_COLORS[node.color] || 'rgba(72,149,239,0.3)');
  glow.setAttribute('filter', 'blur(6px)');
  g.appendChild(glow);

  // Main rect
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('width', node.w); rect.setAttribute('height', node.h);
  rect.setAttribute('rx', node.type === 'center' ? 20 : node.type === 'main' ? 14 : node.type === 'sub' ? 10 : 8);
  rect.setAttribute('fill', `url(#${node.color})`);
  if (node.type === 'leaf') {
    rect.setAttribute('fill', '#1A1F35');
    rect.setAttribute('stroke', getComputedColor(node.color));
    rect.setAttribute('stroke-width', '1.5');
    rect.setAttribute('stroke-opacity', '0.6');
  }
  g.appendChild(rect);

  // Label
  const text = document.createElementNS('http://www.w3.org/2000/svg','text');
  text.setAttribute('x', node.w/2); text.setAttribute('y', node.h/2);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', '#fff');
  text.style.fontSize = node.type === 'center' ? '17px' :
                        node.type === 'main'   ? '13px' :
                        node.type === 'sub'    ? '11px' : '10px';
  text.style.fontWeight = node.type === 'leaf' ? '400' : '700';
  text.textContent = node.label;
  g.appendChild(text);

  // Sub-label for center
  if (node.sub) {
    const sub = document.createElementNS('http://www.w3.org/2000/svg','text');
    sub.setAttribute('x', node.w/2); sub.setAttribute('y', node.h/2 + 18);
    sub.setAttribute('text-anchor', 'middle');
    sub.setAttribute('fill', 'rgba(255,255,255,0.7)');
    sub.style.fontSize = '11px';
    sub.textContent = node.sub;
    g.appendChild(sub);
  }

  // Hover effect
  g.addEventListener('mouseenter', () => {
    glow.setAttribute('filter', 'blur(10px)');
    g.style.opacity = '0.92';
    rect.setAttribute('opacity','0.9');
  });
  g.addEventListener('mouseleave', () => {
    glow.setAttribute('filter', 'blur(6px)');
    g.style.opacity = '1';
    rect.setAttribute('opacity','1');
  });

  root.appendChild(g);

  if (node.children) node.children.forEach(renderNode);
}

function render() {
  root.innerHTML = '';
  const W = svg.clientWidth || 1400;
  const H = svg.clientHeight || 800;

  computePositions(DATA, W/2, H/2, 0, 120);

  renderEdges(DATA);
  renderNode(DATA);

  transform = { x: 0, y: 0, scale: 1 };
  applyTransform();
}

// ══════════════════════════════════════════════════════════════
// DRAG & ZOOM
// ══════════════════════════════════════════════════════════════
let dragging = false, startX, startY, startTX, startTY;

const wrap = document.getElementById('canvas-wrap');

wrap.addEventListener('mousedown', e => {
  dragging = true;
  startX = e.clientX; startY = e.clientY;
  startTX = transform.x; startTY = transform.y;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  transform.x = startTX + (e.clientX - startX);
  transform.y = startTY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  transform.x = mx - (mx - transform.x) * factor;
  transform.y = my - (my - transform.y) * factor;
  transform.scale *= factor;
  transform.scale = Math.min(Math.max(transform.scale, 0.2), 4);
  applyTransform();
}, { passive: false });

document.getElementById('zoomIn').onclick = () => {
  transform.scale = Math.min(transform.scale * 1.2, 4); applyTransform();
};
document.getElementById('zoomOut').onclick = () => {
  transform.scale = Math.max(transform.scale * 0.83, 0.2); applyTransform();
};
document.getElementById('reset').onclick = render;

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
window.addEventListener('load', render);
window.addEventListener('resize', render);
</script>
