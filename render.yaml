services:
  - type: web
    name: orchiimmo
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py shell -c \"from django.contrib.auth.models import User; User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'simohamedhadi05@gmail.com', 'Orchi2026!')\" && echo 'Build OK'"
    startCommand: "gunicorn config.wsgi:application --workers 1 --threads 4 --worker-class gthread --bind 0.0.0.0:$PORT --timeout 120 --preload"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_prod
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: ALLOWED_HOSTS
        value: "orchiimmo.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://orchiimmo.onrender.com"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: simohamedhadi05@gmail.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: Orchi2026!
      - key: SCRAPE_AUTO_ENABLED
        value: "False"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: DEFAULT_FROM_EMAIL
        value: "Orchiimmo <noreply@orchiimmo.ma>"
      - key: DATABASE_URL
        fromDatabase:
          name: orchiimmo-db
          property: connectionString

databases:
  - name: orchiimmo-db
    databaseName: orchiimmo
    plan: free
    region: frankfurt
